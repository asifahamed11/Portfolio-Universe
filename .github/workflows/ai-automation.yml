name: AI Summary Automation & Deploy

on:
  # Runs whenever you push code to the main branch
  push:
    branches: ["main"]
  # Allows you to manually run this workflow from the GitHub Actions tab
  workflow_dispatch: 
  # Runs automatically every day at midnight UTC to process any new portfolios
  schedule:
    - cron: '0 0 * * *'

# Sets permissions of the GITHUB_TOKEN to allow committing code and deploying to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Update Portfolios Data
        run: node scripts/update-data.js

      - name: Sync New Portfolios to Firestore
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
        run: node scripts/migrate-to-firestore.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run Hybrid AI Pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATA_FILE: src/data/portfolios.json
          BATCH_SIZE: "150"
        run: python scripts/hybrid_pipeline.py

      - name: Commit and Push Updated Portfolios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/portfolios.json
          # Only commit if there are changes (prevents errors if no new portfolios were fetched)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update portfolio list [skip ci]" && git pull --rebase && git push || echo "Push failed")

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Build Astro Project
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
